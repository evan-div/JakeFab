  </defs>
  <rect width="1600" height="1100" fill="url(#g)"/>
  <rect width="1600" height="1100" fill="url(#g)" filter="url(#grain)" opacity="0.5"/>
  <g stroke="#caa06a" stroke-opacity="0.28" stroke-width="2">
    <line x1="0" y1="550" x2="1600" y2="430"/>
    <line x1="0" y1="682" x2="1600" y2="562"/>
