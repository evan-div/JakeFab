    <text x="800" y="540" font-size="46" letter-spacing="6" opacity="0.92">PLACEHOLDER</text>
    <text x="800" y="594" font-size="28" letter-spacing="2" opacity="0.7">Oak cap rail · Warm wood</text>
    <text x="800" y="642" font-size="20" letter-spacing="4" opacity="0.45">1600×1100</text>
  </g>
